<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .box { fill: #0f172a; stroke: #2563eb; stroke-width: 3; }
      .text { fill: #e2e8f0; font-family: Inter, Arial, sans-serif; font-size: 20px; }
      .label { fill: #94a3b8; font-size: 16px; }
      .arrow { fill: none; stroke: #60a5fa; stroke-width: 3; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa" />
    </marker>
  </defs>

  <rect x="80" y="100" width="220" height="120" class="box" rx="16"/>
  <text x="190" y="140" text-anchor="middle" class="text">User</text>
  <text x="190" y="170" text-anchor="middle" class="label">Browser / UI</text>

  <rect x="380" y="100" width="260" height="120" class="box" rx="16"/>
  <text x="510" y="140" text-anchor="middle" class="text">Next.js App</text>
  <text x="510" y="170" text-anchor="middle" class="label">App Router + components</text>

  <rect x="720" y="100" width="260" height="120" class="box" rx="16"/>
  <text x="850" y="140" text-anchor="middle" class="text">API Routes</text>
  <text x="850" y="170" text-anchor="middle" class="label">Dashboard, IAM, Audit, DB</text>

  <line x1="300" y1="160" x2="380" y2="160" class="arrow" />
  <line x1="640" y1="160" x2="720" y2="160" class="arrow" />

  <rect x="220" y="320" width="320" height="120" class="box" rx="16"/>
  <text x="380" y="360" text-anchor="middle" class="text">Prisma & Database</text>
  <text x="380" y="390" text-anchor="middle" class="label">Schema, migrations, seed</text>

  <rect x="620" y="320" width="320" height="120" class="box" rx="16"/>
  <text x="780" y="360" text-anchor="middle" class="text">AWS Services</text>
  <text x="780" y="390" text-anchor="middle" class="label">IAM, CloudTrail, RDS/Aurora</text>

  <line x1="850" y1="220" x2="850" y2="320" class="arrow" />
  <line x1="510" y1="220" x2="510" y2="320" class="arrow" />

  <line x1="400" y1="380" x2="720" y2="380" class="arrow" />

  <text x="110" y="530" class="label">Architecture flow from user to backend systems</text>
</svg>